spring.datasource.url=jdbc:postgresql://${DATABASE_URL}:${DATABASE_PORT}/${DATABASE_SCHEMA}?sslmode=${DATABASE_SSLMODE:prefer}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# Shared free-tier databases (e.g. filess.io) cap concurrent connections very
# low, so keep the pool small to avoid "too many connections" failures.
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

springdoc.api-docs.enabled=${OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${OPENAPI_ENABLED:false}

server.port=${PORT:8080}
