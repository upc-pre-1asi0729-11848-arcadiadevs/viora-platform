spring.application.name=viora-platform

# Default local development profile
spring.profiles.default=dev
spring.config.import=optional:file:.env[.properties]

# Cross-origin origins allowed to consume the API (comma-separated). Default is
# permissive for the demo; set CORS_ALLOWED_ORIGINS to the real frontend origins.
web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.naming.physical-strategy=com.arcadiadevs.viora.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCasePhysicalNamingStrategy

documentation.application.description=Viora Platform REST API for agronomic management and monitoring.
documentation.application.version=1.0.0

# Dynamic nutrition rules. Defaults are course-level configuration and must be
# validated by an agronomist before production use.
agronomic.dynamic-nutrition.temperature-reference-celsius=${NUTRITION_TEMPERATURE_REFERENCE_CELSIUS:20.0}
agronomic.dynamic-nutrition.high-risk-ndvi-threshold=${NUTRITION_HIGH_RISK_NDVI_THRESHOLD:0.30}
agronomic.dynamic-nutrition.moderate-risk-ndvi-threshold=${NUTRITION_MODERATE_RISK_NDVI_THRESHOLD:0.50}
agronomic.dynamic-nutrition.high-risk-window-days=${NUTRITION_HIGH_RISK_WINDOW_DAYS:3}
agronomic.dynamic-nutrition.extreme-risk-window-days=${NUTRITION_EXTREME_RISK_WINDOW_DAYS:2}
agronomic.dynamic-nutrition.foliar-support-dosage-liters-per-hectare=${NUTRITION_FOLIAR_SUPPORT_LITERS_PER_HECTARE:2.5}
agronomic.dynamic-nutrition.potassium-calcium-dosage-kilograms-per-hectare=${NUTRITION_POTASSIUM_CALCIUM_KG_PER_HECTARE:3.0}
agronomic.dynamic-nutrition.biostimulant-dosage-liters-per-hectare=${NUTRITION_BIOSTIMULANT_LITERS_PER_HECTARE:1.2}

# Yield-estimation heuristic. Course-level defaults; validate with an agronomist.
agronomic.yield-forecast.base-yield-tonnes-per-hectare=${YIELD_BASE_TONNES_PER_HECTARE:4.0}
agronomic.yield-forecast.ndvi-floor=${YIELD_NDVI_FLOOR:0.20}
agronomic.yield-forecast.ndvi-optimal=${YIELD_NDVI_OPTIMAL:0.80}
agronomic.yield-forecast.chill-min-factor=${YIELD_CHILL_MIN_FACTOR:0.60}

# Winter-chill requirement, in Dynamic Model chill portions (CP). Single source of
# truth shared by the trend chart's reference line and the yield chill modifier.
# Course-level defaults per crop; validate with an agronomist. Olive is a
# low-chill species, hence a modest requirement relative to temperate stone fruit.
agronomic.chill.default-requirement-portions=${CHILL_DEFAULT_REQUIREMENT_PORTIONS:50.0}
agronomic.chill.crop-requirement-portions.olive=${CHILL_OLIVE_REQUIREMENT_PORTIONS:40.0}
agronomic.chill.crop-requirement-portions.olivo=${CHILL_OLIVE_REQUIREMENT_PORTIONS:40.0}

# Agronomic statistic snapshots and trend charts
agronomic.statistics.scheduled-ingestion-enabled=${AGRONOMIC_STATISTICS_SCHEDULED_INGESTION_ENABLED:false}
agronomic.statistics.ingestion-cron=${AGRONOMIC_STATISTICS_INGESTION_CRON:0 0 2 * * *}

# AgroMonitoring satellite imagery and weather integration
integrations.agromonitoring.enabled=${AGROMONITORING_ENABLED:false}
integrations.agromonitoring.base-url=${AGROMONITORING_BASE_URL:https://api.agromonitoring.com}
integrations.agromonitoring.api-key=${AGROMONITORING_API_KEY:}
integrations.agromonitoring.imagery-lookback-days=${AGROMONITORING_IMAGERY_LOOKBACK_DAYS:30}
integrations.agromonitoring.maximum-cloud-percentage=${AGROMONITORING_MAXIMUM_CLOUD_PERCENTAGE:100}
integrations.agromonitoring.refresh-interval-minutes=${AGROMONITORING_REFRESH_INTERVAL_MINUTES:60}
integrations.agromonitoring.weather-refresh-minutes=${AGROMONITORING_WEATHER_REFRESH_MINUTES:60}
integrations.agromonitoring.connect-timeout-millis=${AGROMONITORING_CONNECT_TIMEOUT_MILLIS:3000}
integrations.agromonitoring.read-timeout-millis=${AGROMONITORING_READ_TIMEOUT_MILLIS:8000}
integrations.agromonitoring.quota-cooldown-minutes=${AGROMONITORING_QUOTA_COOLDOWN_MINUTES:15}
# Generous cache TTLs to spare the free API quota; lower for production freshness.
integrations.agromonitoring.forecast-cache-ttl-minutes=${AGROMONITORING_FORECAST_CACHE_TTL_MINUTES:360}
integrations.agromonitoring.current-weather-cache-ttl-minutes=${AGROMONITORING_CURRENT_WEATHER_CACHE_TTL_MINUTES:60}
integrations.agromonitoring.weather-history-cache-ttl-minutes=${AGROMONITORING_WEATHER_HISTORY_CACHE_TTL_MINUTES:720}
integrations.agromonitoring.ndvi-history-cache-ttl-minutes=${AGROMONITORING_NDVI_HISTORY_CACHE_TTL_MINUTES:720}
