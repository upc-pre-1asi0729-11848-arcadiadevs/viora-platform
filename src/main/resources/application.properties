spring.application.name=viora-platform

# Default local development profile
spring.profiles.default=dev
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.naming.physical-strategy=com.arcadiadevs.viora.platform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCasePhysicalNamingStrategy

documentation.application.description=Viora Platform REST API for agronomic management and monitoring.
documentation.application.version=0.0.1-SNAPSHOT

# Dynamic nutrition rules. Defaults are course-level configuration and must be
# validated by an agronomist before production use.
agronomic.dynamic-nutrition.temperature-reference-celsius=${NUTRITION_TEMPERATURE_REFERENCE_CELSIUS:20.0}
agronomic.dynamic-nutrition.high-risk-ndvi-threshold=${NUTRITION_HIGH_RISK_NDVI_THRESHOLD:0.30}
agronomic.dynamic-nutrition.moderate-risk-ndvi-threshold=${NUTRITION_MODERATE_RISK_NDVI_THRESHOLD:0.50}
agronomic.dynamic-nutrition.high-risk-window-days=${NUTRITION_HIGH_RISK_WINDOW_DAYS:3}
agronomic.dynamic-nutrition.extreme-risk-window-days=${NUTRITION_EXTREME_RISK_WINDOW_DAYS:2}
agronomic.dynamic-nutrition.foliar-support-dosage-liters-per-hectare=${NUTRITION_FOLIAR_SUPPORT_LITERS_PER_HECTARE:2.5}
agronomic.dynamic-nutrition.potassium-calcium-dosage-kilograms-per-hectare=${NUTRITION_POTASSIUM_CALCIUM_KG_PER_HECTARE:3.0}
agronomic.dynamic-nutrition.biostimulant-dosage-liters-per-hectare=${NUTRITION_BIOSTIMULANT_LITERS_PER_HECTARE:1.2}

# AgroMonitoring satellite imagery and weather integration
integrations.agromonitoring.enabled=${AGROMONITORING_ENABLED:false}
integrations.agromonitoring.base-url=${AGROMONITORING_BASE_URL:https://api.agromonitoring.com}
integrations.agromonitoring.api-key=${AGROMONITORING_API_KEY:}
integrations.agromonitoring.imagery-lookback-days=${AGROMONITORING_IMAGERY_LOOKBACK_DAYS:30}
integrations.agromonitoring.maximum-cloud-percentage=${AGROMONITORING_MAXIMUM_CLOUD_PERCENTAGE:100}
integrations.agromonitoring.refresh-interval-minutes=${AGROMONITORING_REFRESH_INTERVAL_MINUTES:60}
